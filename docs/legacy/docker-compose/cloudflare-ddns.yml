---
services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:1.15.1
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop: [all]
    security_opt: [no-new-privileges:true]
    environment:
      - CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN
      - DOMAINS=cantone.net,www.cantone.net,*.cantone.net
      - PROXIED=true
