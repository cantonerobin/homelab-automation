#  recyclarr:       # Radarr/Sonarr quality profile sync
#  watchtower:      # Auto-updates (replaced by Renovate in GitOps)
#  unpackerr:       # Auto-unzip for NZBGet downloads
#  qbittorrent:     # Torrent client (not active)
