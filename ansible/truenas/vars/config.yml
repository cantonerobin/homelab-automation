# TrueNAS connection
truenas_url: "https://192.168.10.25"
truenas_validate_certs: false  # self-signed cert

# SSH Private Key — muss im WSL-Filesystem liegen (nicht /mnt/c/), sonst 0777-Permissions-Fehler
ansible_ssh_key: "~/.ssh/ansible"

# Disk-Seriennummern — stabil über Reboots, unabhängig von sda/sdb/etc.
data_pool_serials:
  - ZW611XR4          # 3TB Seagate
  - WD-WCC4N0PU0J03   # 3TB WD
  - WD-WCC4N4CLA3YZ   # 3TB WD
  - WD-WCC4N3HVJ1FL   # 3TB WD
archive_pool_serial: 2327E6EB5451   # 2TB SSD

# NFS
nfs_allowed_network: "192.168.10.0/24"

# Datasets
datasets:
  - name: data/mediastack
    snapshot: false        # Container, kein Snapshot nötig
  - name: data/mediastack/mediastack-data
    recordsize: 512K
    atime: "OFF"
  - name: data/vms
    snapshot: false        # Container für VM-Zvols, kein Snapshot nötig

# Zvols (VM OS-Disks unter data/vms, Downloads unter data/mediastack)
zvols:
  - name: data/vms/mediastack-os
    volsize: 42949672960   # 40GB
    volblocksize: "16K"
  - name: data/mediastack/mediastack-downloads
    volsize: 107374182400  # 100GB
    volblocksize: "16K"

# VMs
truenas_vm_bridge: enp6s0
mediastack_vm_mac: "00:a0:98:0c:f0:b1"

# NFS Shares
nfs_shares:
  - path: /mnt/data/mediastack/mediastack-data

# Netzwerk
truenas_hostname: "truenas"
truenas_domain: "cantone.net"
truenas_interface: "enp6s0"
truenas_ip: "192.168.10.25"
truenas_netmask: 24
truenas_gateway: "192.168.10.1"
truenas_nameserver1: "192.168.10.1"
