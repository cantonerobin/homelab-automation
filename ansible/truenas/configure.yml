---
# Konfiguration via SSH + midclt
# Voraussetzung: SSH aktiviert + ansible.pub beim root-User hinterlegt (manuell via WebUI)

- name: TrueNAS konfigurieren
  hosts: truenas
  gather_facts: false
  vars_files:
    - vars/config.yml
    - vars/secrets.yml

  tasks:

    # ------------------------------------------------------------------ #
    # UI Session Timeout deaktivieren
    # ------------------------------------------------------------------ #
    - name: Token Lifetime auf Maximum setzen (Session-Timeout deaktivieren)
      command: midclt call system.general.update '{"token_lifetime": 2147483647}'

    # ------------------------------------------------------------------ #
    # Disk-Namen aus Seriennummern auflösen
    # ------------------------------------------------------------------ #
    - name: Alle Disks abfragen
      command: midclt call disk.query
      register: all_disks_raw
      changed_when: false

    - name: Disk-Namen aus Serials auflösen
      set_fact:
        all_disks: "{{ all_disks_raw.stdout | from_json }}"
        data_pool_disks: "{{ all_disks_raw.stdout | from_json | selectattr('serial', 'in', data_pool_serials) | map(attribute='name') | list }}"
        archive_pool_disk: "{{ (all_disks_raw.stdout | from_json | selectattr('serial', 'equalto', archive_pool_serial) | map(attribute='name') | list)[0] }}"

    - name: Prüfen ob alle Data-Disks gefunden
      assert:
        that: data_pool_disks | length == data_pool_serials | length
        fail_msg: "Nicht alle Disks gefunden! Erwartet {{ data_pool_serials }}, gefunden: {{ data_pool_disks }}"

    - name: Gefundene Disk-Namen anzeigen
      debug:
        msg: "data pool disks: {{ data_pool_disks }} | archive disk: {{ archive_pool_disk }}"

    # ------------------------------------------------------------------ #
    # data pool
    # ------------------------------------------------------------------ #
    - name: Prüfen ob data pool existiert
      command: midclt call pool.query '[["name","=","data"]]'
      register: existing_data_pool_raw
      changed_when: false

    - name: Data-Disks wipen
      include_tasks: tasks/wipe_disk.yml
      loop: "{{ data_pool_disks }}"
      loop_control:
        loop_var: disk_name
      when: existing_data_pool_raw.stdout | from_json | length == 0

    - name: data pool anlegen (RAIDZ1)
      command: midclt call --job pool.create '{{ pool_body | to_json }}'
      vars:
        pool_body:
          name: data
          topology:
            data:
              - type: RAIDZ1
                disks: "{{ data_pool_disks }}"
      when: existing_data_pool_raw.stdout | from_json | length == 0

    # ------------------------------------------------------------------ #
    # archive pool (2TB SSD)
    # ------------------------------------------------------------------ #
    - name: Prüfen ob archive pool existiert
      command: midclt call pool.query '[["name","=","archive"]]'
      register: existing_archive_pool_raw
      changed_when: false

    - name: Archive-Disk wipen
      include_tasks: tasks/wipe_disk.yml
      loop:
        - "{{ archive_pool_disk }}"
      loop_control:
        loop_var: disk_name
      when: existing_archive_pool_raw.stdout | from_json | length == 0

    - name: archive pool anlegen (single disk)
      command: midclt call --job pool.create '{{ pool_body | to_json }}'
      vars:
        pool_body:
          name: archive
          topology:
            data:
              - type: STRIPE
                disks:
                  - "{{ archive_pool_disk }}"
      when: existing_archive_pool_raw.stdout | from_json | length == 0

    # ------------------------------------------------------------------ #
    # Datasets
    # ------------------------------------------------------------------ #
    - name: Existierende Datasets abfragen
      command: midclt call pool.dataset.query
      register: existing_datasets_raw
      changed_when: false

    - name: Datasets anlegen
      command: midclt call pool.dataset.create '{{ dataset_body | to_json }}'
      vars:
        dataset_body:
          name: "{{ item.name }}"
          compression: LZ4
      loop: "{{ datasets }}"
      when: item.name not in (existing_datasets_raw.stdout | from_json | map(attribute='name') | list)

    # ------------------------------------------------------------------ #
    # Zvols
    # ------------------------------------------------------------------ #
    - name: Zvols anlegen
      shell: >
        midclt call pool.dataset.create
        '{"name": "{{ item.name }}", "type": "VOLUME", "volsize": {{ item.volsize | int }}, "volblocksize": "512"}'
      loop: "{{ zvols }}"
      when: item.name not in (existing_datasets_raw.stdout | from_json | map(attribute='name') | list)

    # ------------------------------------------------------------------ #
    # NFS
    # ------------------------------------------------------------------ #
    - name: NFS Service starten
      command: midclt call service.control '"START"' '"nfs"' '{}'
      changed_when: false

    - name: NFS Service-ID abfragen
      command: midclt call service.query '[["service","=","nfs"]]'
      register: nfs_service_raw
      changed_when: false

    - name: NFS Autostart aktivieren
      command: >
        midclt call service.update
        '{{ (nfs_service_raw.stdout | from_json)[0].id }}'
        '{"enable": true}'

    - name: Existierende NFS-Shares abfragen
      command: midclt call sharing.nfs.query
      register: existing_nfs_raw
      changed_when: false

    - name: NFS-Shares anlegen
      command: midclt call sharing.nfs.create '{{ share_body | to_json }}'
      vars:
        share_body:
          path: "{{ item.path }}"
          networks:
            - "{{ nfs_allowed_network }}"
          mapall_user: root
          mapall_group: wheel
      loop: "{{ nfs_shares }}"
      when: item.path not in (existing_nfs_raw.stdout | from_json | map(attribute='path') | list)

    # ------------------------------------------------------------------ #
    # Snapshot Tasks
    # ------------------------------------------------------------------ #
    - name: Existierende Snapshot-Tasks abfragen
      command: midclt call pool.snapshottask.query
      register: existing_snapshots_raw
      changed_when: false

    - name: Snapshot-Tasks anlegen
      command: midclt call pool.snapshottask.create '{{ snapshot_body | to_json }}'
      vars:
        snapshot_body:
          dataset: "{{ item.name }}"
          recursive: false
          lifetime_value: 2
          lifetime_unit: WEEK
          enabled: true
          naming_schema: "auto-%Y-%m-%d_%H-%M"
          schedule:
            minute: "0"
            hour: "0"
            dom: "*"
            month: "*"
            dow: "*"
      loop: "{{ datasets }}"
      when: item.name not in (existing_snapshots_raw.stdout | from_json | map(attribute='dataset') | list)

    # ------------------------------------------------------------------ #
    # Scrub Tasks
    # ------------------------------------------------------------------ #
    # Hinweis: pool.scrub.create erwartet pool-ID (integer), nicht pool_name (string).

    - name: Existierende Scrub-Tasks abfragen
      command: midclt call pool.scrub.query
      register: existing_scrub_raw
      changed_when: false

    - name: Pool-IDs abfragen
      command: midclt call pool.query '[["name","=","{{ item }}"]]'
      register: pool_ids_raw
      loop:
        - data
        - archive
      changed_when: false

    - name: Scrub-Tasks anlegen
      command: midclt call pool.scrub.create '{{ scrub_body | to_json }}'
      vars:
        pool_id: "{{ (pool_ids_raw.results[loop_index].stdout | from_json)[0].id }}"
        existing_scrub_pool_names: "{{ existing_scrub_raw.stdout | from_json | map(attribute='pool_name') | list }}"
        scrub_body:
          pool: "{{ pool_id }}"
          threshold: 35
          enabled: true
          schedule:
            minute: "0"
            hour: "0"
            dom: "*"
            month: "*"
            dow: "0"
      loop:
        - data
        - archive
      loop_control:
        index_var: loop_index
      when: item not in existing_scrub_pool_names

    # ------------------------------------------------------------------ #
    # S.M.A.R.T.
    # ------------------------------------------------------------------ #
    # Kein midclt-Endpoint für SMART-Test-Schedules verfügbar.
    # Manuell in der UI konfigurieren:
    # Data Protection → S.M.A.R.T. Tests → Add
    # Empfehlung: SHORT weekly (Sonntag 01:00), LONG monthly (1. des Monats 02:00)

    # ------------------------------------------------------------------ #
    # VMs
    # ------------------------------------------------------------------ #
    # Disk-Layout:
    #   PBS VM:   data/pbs-vm (32GB zvol, OS)
    #   Media VM: data/media-vm (50GB zvol, OS)
    #             data/media-config (50GB zvol, /opt/mediastack)
    #
    # OS-Installation erfolgt via netboot.xyz (P1-28).

    - name: Existierende VMs abfragen
      command: midclt call vm.query
      register: existing_vms_raw
      changed_when: false

    - name: PBS VM anlegen
      command: midclt call vm.create '{{ vm_body | to_json }}'
      vars:
        vm_body:
          name: pbs
          description: "Proxmox Backup Server"
          vcpus: 4
          cores: 4
          memory: 8192
          autostart: true
          cpu_mode: HOST-PASSTHROUGH
      register: pbs_vm
      when: "'pbs' not in (existing_vms_raw.stdout | from_json | map(attribute='name') | list)"

    - name: PBS VM — OS-Disk (32GB zvol auf data)
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (pbs_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "DISK", "type": "AHCI", "path": "/dev/zvol/data/pbs-vm"}}'
      when: pbs_vm is changed

    - name: PBS VM — NIC
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (pbs_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "NIC", "type": "VIRTIO", "nic_attach": "{{ truenas_vm_bridge }}", "mac": "{{ pbs_vm_mac }}"}}'
      when: pbs_vm is changed

    - name: PBS VM — Display (VNC)
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (pbs_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "DISPLAY", "type": "SPICE", "port": 5900, "bind": "0.0.0.0", "wait": false, "resolution": "1024x768", "web": true, "password": "{{ truenas_vm_vnc_password }}"}}'
      when: pbs_vm is changed


    - name: Media VM anlegen
      command: midclt call vm.create '{{ vm_body | to_json }}'
      vars:
        vm_body:
          name: mediastack
          description: "Plex + NZBGet"
          vcpus: 4
          cores: 4
          memory: 16384
          autostart: true
          cpu_mode: HOST-PASSTHROUGH
      register: media_vm
      when: "'mediastack' not in (existing_vms_raw.stdout | from_json | map(attribute='name') | list)"

    - name: Media VM — OS-Disk (50GB zvol auf data)
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (media_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "DISK", "type": "AHCI", "path": "/dev/zvol/data/media-vm"}}'
      when: media_vm is changed

    - name: Media VM — Config-Disk (data/media-config zvol, /opt/mediastack)
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (media_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "DISK", "type": "AHCI", "path": "/dev/zvol/data/media-config"}}'
      when: media_vm is changed

    - name: Media VM — NIC
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (media_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "NIC", "type": "VIRTIO", "nic_attach": "{{ truenas_vm_bridge }}", "mac": "{{ mediastack_vm_mac }}"}}'
      when: media_vm is changed

    - name: Media VM — Display (VNC)
      shell: >
        midclt call vm.device.create
        '{"vm": {{ (media_vm.stdout | from_json).id | int }}, "attributes": {"dtype": "DISPLAY", "type": "SPICE", "port": 5902, "bind": "0.0.0.0", "wait": false, "resolution": "1024x768", "web": true, "password": "{{ truenas_vm_vnc_password }}"}}'
      when: media_vm is changed


    # ------------------------------------------------------------------ #
    # Netzwerk
    # ------------------------------------------------------------------ #
    # ⚠️  Diese Tasks ans Ende — bei IP-Wechsel bricht die SSH-Verbindung ab.
    #     Alles oberhalb ist dann bereits konfiguriert.

    - name: Hostname, Gateway und DNS konfigurieren
      command: midclt call network.configuration.update '{{ net_body | to_json }}'
      vars:
        net_body:
          hostname: "{{ truenas_hostname }}"
          domain: "{{ truenas_domain }}"
          ipv4gateway: "{{ truenas_gateway }}"
          nameserver1: "{{ truenas_nameserver1 }}"

    - name: Statische IP auf Interface setzen
      command: >
        midclt call interface.update
        '"{{ truenas_interface }}"'
        '{{ iface_body | to_json }}'
      vars:
        iface_body:
          aliases:
            - address: "{{ truenas_ip }}"
              netmask: "{{ truenas_netmask }}"
              type: INET

    - name: Interface-Änderungen committen (Verbindung bricht hier ab bei IP-Wechsel)
      command: midclt call interface.commit '{{ commit_body | to_json }}'
      vars:
        commit_body:
          rollback: false
      ignore_errors: true
